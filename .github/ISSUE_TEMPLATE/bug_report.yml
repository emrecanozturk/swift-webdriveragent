name: Bug report
description: Report a build, launch, or endpoint issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: xcode
    attributes:
      label: Xcode version
    validations:
      required: true
  - type: input
    id: ios
    attributes:
      label: iOS version
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Failure layer
      options:
        - Build
        - Signing
        - XCTest launch
        - Transport
        - Endpoint behavior
        - Documentation
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove UDIDs, signing material, private bundle ids, and internal paths.
