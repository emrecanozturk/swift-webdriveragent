name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '27 3 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build without signing
        run: bash scripts/build-for-testing.sh

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
